# docker-compose.prod.yml - PARA PRODUCCIÓN
# En producción, NO incluimos PostgreSQL porque usas Supabase

services:
  backend:
    build:
      context: ./backend
      target: production  # Usamos la etapa de producción
    container_name: prod-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}  # Tomada de variables de entorno del host/Supabase
      - ENVIRONMENT=production
    env_file:
      - ./backend/.env
    restart: unless-stopped
    # No montamos volúmenes de código en producción

  frontend:
    build:
      context: ./frontend
      target: production  # Usamos la etapa de producción
    container_name: prod-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}  # URL de tu backend en producción
      - NODE_ENV=production
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    depends_on:
      - backend