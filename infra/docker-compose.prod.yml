services:
  # ─── BACKEND (SOLO INTERNO, NO EXPUESTO) ───
  backend:
    build:
      context: ../backend
      target: production
    container_name: prod-backend
    # ❌ SIN ports: (no exponemos directamente)
    
    environment:
      # - DATABASE_URL=postgresql://neondb_owner:npg_3i2hHOyqocRx@ep-aged-bird-acq2a8wh.sa-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require  # De Supabase o Neon
      - ENVIRONMENT=production
      # Opcional: variables adicionales
    env_file:
      - ../backend/.env.prod  # ✅ Archivo específico para producción
    
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 400M  # 🔴 CRÍTICO para tu RAM de 3.3 GB
        reservations:
          memory: 200M
    networks:
      - app-network  # ✅ Para comunicarse con Nginx Proxy Manager
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── FRONTEND (React) ───
  frontend:
    build:
      context: ../frontend
      target: production
    container_name: prod-frontend
    # ❌ QUITAMOS: ports: - "3000:3000" (Nginx manejará el routing)
    
    environment:
      - VITE_API_URL=${VITE_API_URL}  # URL del backend (vía Nginx)
      - VITE_APP_ENV=production
    env_file:
      - ../frontend/.env.prod  # ✅ Archivo específico para producción
    
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M  # 🔴 CRÍTICO para tu RAM
        reservations:
          memory: 150M
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy

# ─── REDES ───
networks:
  app-network:
    external: true  # ✅ Usa la red que ya creamos para Nginx + Cloudflared